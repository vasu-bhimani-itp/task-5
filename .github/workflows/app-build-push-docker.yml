name: Task-6 - App CI (Build & Push to ECR)

on:
  push:
    branches:
      - task-6
    paths:
      - 'app/**'


permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }} # FULL URL
  AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🔐 Configure AWS via OIDC
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # 🔐 Login to ECR
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # 🏷️ Set image tag (commit SHA)
      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      # 🏗️ Build Docker image (already tagged with FULL ECR URL)
      - name: Build Docker image
        run: |
          docker build -t $ECR_REPOSITORY:${IMAGE_TAG} ./app

      # 📤 Push to ECR (NO prefixing!)
      - name: Push image to ECR
        run: |
          docker push $ECR_REPOSITORY:${IMAGE_TAG}

      # 🚀 Deploy on EC2 via SSM
      - name: Deploy on EC2 via SSM
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

          INSTANCE_IDS=$(aws ec2 describe-instances \
            --filters "Name=tag:uid,Values=vasubhimani" "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].InstanceId" \
            --output text)

          echo "Found instances: $INSTANCE_IDS"

          aws ssm send-command \
            --instance-ids $INSTANCE_IDS \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy latest container" \
            --parameters commands="[
              \"aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com\",
              \"docker pull $ECR_REPOSITORY:$IMAGE_TAG\",
              \"docker rm -f my-app || true\",
              \"docker run -d -p 80:5000 --name my-app $ECR_REPOSITORY:$IMAGE_TAG\"
            ]"